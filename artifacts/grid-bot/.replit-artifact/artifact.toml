kind = "web"
previewPath = "/"
title = "Bulk Grid Trading Bot"
version = "1.0.0"
id = "artifacts/grid-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24830

[services.development]
run = "pnpm --filter @workspace/grid-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grid-bot", "run", "build" ]
publicDir = "artifacts/grid-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24830"
BASE_PATH = "/"
